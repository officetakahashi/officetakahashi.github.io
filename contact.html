<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 事業計画オフィスタカハシ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --sidebar-bg: #f5f1ed;
      --text: #222222;
      --nav-text: #333333;
      --nav-active: #222222;
      --accent-line: #222222;
      --sidebar-width: 160px;
    }
    body { font-family: 'Noto Sans JP', sans-serif; font-weight: 300; color: var(--text); background: var(--bg); min-height: 100vh; display: flex; }
    .sidebar { width: var(--sidebar-width); min-height: 100vh; background: var(--sidebar-bg); position: fixed; top: 0; left: 0; display: flex; flex-direction: column; padding: 40px 0; }
    .sidebar-logo { font-size: 11px; font-weight: 500; color: var(--nav-text); letter-spacing: 0.05em; line-height: 1.6; padding: 0 24px; margin-bottom: 56px; }
    nav { display: flex; flex-direction: column; gap: 0; }
    nav a { display: block; font-size: 13px; font-weight: 300; color: var(--nav-text); text-decoration: none; padding: 12px 24px; letter-spacing: 0.05em; line-height: 1.5; border-left: 2px solid transparent; transition: color 0.2s; }
    nav a:hover { color: var(--nav-active); }
    nav a.active { color: var(--nav-active); border-left: 2px solid var(--accent-line); font-weight: 400; }
    .sidebar-footer { margin-top: auto; padding: 0 24px; display: flex; flex-direction: column; align-items: flex-end; }
    .sidebar-footer .bpot-mark { font-size: 18px; font-weight: 500; letter-spacing: 0.12em; color: #555555; line-height: 1.2; }
    .sidebar-footer .since { font-size: 9px; font-weight: 300; letter-spacing: 0.15em; color: #aaaaaa; margin-top: 2px; }
    .main { margin-left: var(--sidebar-width); flex: 1; padding: 100px 80px 120px 80px; max-width: 760px; }
    .page-title { font-size: 13px; font-weight: 400; color: #aaaaaa; letter-spacing: 0.1em; margin-bottom: 64px; }
    .body-text { font-size: 17px; font-weight: 300; line-height: 2.6; color: var(--text); margin-bottom: 72px; }
    .body-text p { margin-bottom: 40px; }
    .body-text p:last-child { margin-bottom: 0; }
    .direct-mail { font-size: 14px; font-weight: 300; color: #888888; margin-top: 8px; }
    .direct-mail a { color: #555555; text-decoration: none; border-bottom: 1px solid #cccccc; padding-bottom: 1px; }
    .form-group { margin-bottom: 40px; }
    .form-label { display: block; font-size: 13px; font-weight: 400; color: #888888; letter-spacing: 0.08em; margin-bottom: 12px; }
    .form-label span { color: #cc6666; margin-left: 4px; font-size: 11px; }
    .form-input, .form-textarea {
      width: 100%;
      border: none;
      border-bottom: 1px solid #d8d4d0;
      background: transparent;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--text);
      padding: 8px 0;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus { border-bottom-color: #222222; }
    .form-textarea { resize: vertical; min-height: 120px; line-height: 2.0; }
    .form-submit {
      margin-top: 56px;
      background: none;
      border: 1px solid #222222;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.1em;
      padding: 16px 48px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .form-submit:hover { background: #222222; color: #ffffff; }
    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 60px 32px 80px 32px; } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">事業計画オフィスタカハシ</div>
    <nav>
      <a href="index.html">トップページ</a>
      <a href="consulting.html">経営のご相談</a>
      <a href="business-plan.html">事業計画書の作成</a>
      <a href="payroll.html">給与計算</a>
      <a href="pricing.html">料金のご案内</a>
      <a href="contact.html" class="active">お問い合わせ</a>
    </nav>
    <div class="sidebar-footer">
      <span class="bpot-mark">BPOT</span>
      <span class="since">since 2005</span>
    </div>
  </aside>
  <main class="main">
    <div class="page-title">お問い合わせ</div>
    <div class="body-text">
      <p>まず、話を聞かせてください。</p>
      <p>何が不安なのか、うまく言葉にできなくても構いません。<br>漠然とした状態のまま、連絡をいただいて大丈夫です。</p>
      <p>1時間、無料でお話しします。<br>直接お会いしても、電話でも、Zoomでも。</p>
      <p class="direct-mail">メールで直接ご連絡いただいても構いません。<br>
        <a href="mailto:contact@officetakahashi.jp">contact@officetakahashi.jp</a>
      </p>
    </div>

    <!-- Formspree のエンドポイントは取得後に YOUR_FORM_ID を置き換えてください -->
    <form action="https://formspree.io/f/xlgprjgo" method="POST">

      <div class="form-group">
        <label class="form-label" for="name">お名前<span>必須</span></label>
        <input class="form-input" type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">メールアドレス<span>必須</span></label>
        <input class="form-input" type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">電話番号</label>
        <input class="form-input" type="tel" id="phone" name="phone">
      </div>

      <div class="form-group">
        <label class="form-label" for="message">メッセージ<span>必須</span></label>
        <textarea class="form-textarea" id="message" name="message" required></textarea>
      </div>

      <button class="form-submit" type="submit">送　信</button>
    </form>
  </main>
</body>
</html>
